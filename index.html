<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>AI DETECTOR</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    body { background-color: #050505; color: #ededed; height: 100vh; overflow: hidden; }
    input, textarea { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 8px; margin-bottom: 16px; outline: none; }
    button { width: 100%; background: #fff; color: #000; padding: 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .view { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
    .view.active { display: flex; }
    #appView { flex-direction: row; align-items: flex-start; justify-content: flex-start; }
    .sidebar { width: 240px; background: #0a0a0a; border-right: 1px solid #1a1a1a; height: 100%; padding: 24px; }
    .main-content { flex: 1; padding: 48px; overflow-y: auto; }
    .tab-content { display: none; } .tab-content.active { display: block; }
    .profile-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 24px; }
    .info-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #141414; }
    .result-box { margin-top: 24px; padding: 32px; background: #0a0a0a; border-radius: 8px; text-align: center; display: none; }
  </style>
</head>
<body>

<div id="loginView" class="view active">
  <div style="width:400px">
    <h1>AI DETECTOR</h1>
    <input type="text" id="licenseInput" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19">
    <button id="loginBtn">Access</button>
  </div>
</div>

<div id="appView" class="view">
  <div class="sidebar">
    <div style="font-weight:700; margin-bottom:40px">DETECTOR</div>
    <div id="navWorkspace" style="cursor:pointer; margin-bottom:10px">Workspace</div>
    <div id="navProfile" style="cursor:pointer">Profile</div>
    <button id="logoutBtn" style="margin-top:auto; background:none; color:#777">Logout</button>
  </div>
  <div class="main-content">
    <div id="tabWorkspace" class="tab-content active" style="max-width:700px">
      <textarea id="textInput" style="height:300px" placeholder="텍스트 입력"></textarea>
      <button id="analyzeBtn">Analyze (Ensemble)</button>
      <div id="resultBox" class="result-box"><div id="aiScore" style="font-size:48px">0%</div></div>
    </div>
    <div id="tabProfile" class="tab-content" style="max-width:700px">
      <div class="profile-card">
        <div class="info-row"><span>License</span><span id="profKey">-</span></div>
        <div class="info-row"><span>Limit</span><span id="profLimit">-</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = "https://atio.onrender.com/api";
  
  // 로그인/로그아웃 및 통신 로직
  document.getElementById('loginBtn').onclick = async () => {
    const key = document.getElementById('licenseInput').value;
    const res = await fetch(`${API_BASE}/verify`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({licenseKey:key}) });
    if (res.ok) { localStorage.setItem('ai_license_key', key); location.reload(); }
    else alert("키 오류");
  };

  document.getElementById('analyzeBtn').onclick = async () => {
    const text = document.getElementById('textInput').value;
    const res = await fetch(`${API_BASE}/detect`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, licenseKey:localStorage.getItem('ai_license_key')}) });
    const data = await res.json();
    if (data.success) { document.getElementById('aiScore').textContent = data.aiScore + "%"; document.getElementById('resultBox').style.display = "block"; }
  };

  document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('ai_license_key'); location.reload(); };
  
  window.onload = () => { if (localStorage.getItem('ai_license_key')) { document.getElementById('loginView').classList.remove('active'); document.getElementById('appView').classList.add('active'); } };
</script>
</body>
</html>
