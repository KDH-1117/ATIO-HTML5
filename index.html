<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolsX</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    body { background-color: #050505; color: #ededed; height: 100vh; overflow: hidden; display: flex; }
    
    .view { display: none; width: 100%; height: 100%; }
    .view.active { display: flex; }
    
    #loginView { flex-direction: column; align-items: center; justify-content: center; background: #000; }
    .login-box { width: 100%; max-width: 380px; padding: 40px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; text-align: center; }
    .login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 32px; color: #fff; }
    
    input[type="text"], textarea { width: 100%; background: #050505; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 8px; font-size: 14px; outline: none; }
    button.primary-btn { width: 100%; background: #fff; color: #000; padding: 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; }
    button.primary-btn:hover { background: #eee; }

    #appView { flex-direction: row; background: #000; }
    .sidebar { width: 220px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 32px 20px; height: 100%; }
    .sidebar-brand { font-size: 18px; font-weight: 700; margin-bottom: 40px; }
    .nav-btn { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 4px; color: #666; font-size: 14px; }
    .nav-btn.active { background: #1a1a1a; color: #fff; }
    #logoutBtn { margin-top: auto; color: #ff4d4d; border: 1px solid #2a1111; background: transparent; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }

    .main-content { flex: 1; display: flex; justify-content: center; padding: 48px; overflow-y: auto; }
    .content-container { width: 100%; max-width: 600px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
    
    .result-box { margin-top: 24px; padding: 32px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; text-align: center; display: none; }
    
    .drop-zone { border: 2px dashed #222; border-radius: 8px; padding: 48px; text-align: center; background: #0a0a0a; cursor: pointer; color: #666; font-size: 14px; }
    .file-info { display: none; margin-top: 16px; padding: 16px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; }
    .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    
    .profile-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 24px; }
    .info-row-profile { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
    .text-green { color: #4ade80; }
    .text-red { color: #ff4d4d; }
    .icon-btn { background: #111; border: 1px solid #333; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; margin-left: 12px; font-size: 12px; }
    #profKey { color: #fff; font-family: monospace; }
  </style>
</head>
<body>

<div id="loginView" class="view">
  <div class="login-box">
    <h1>ToolsX</h1>
    <input type="text" id="licenseInput" placeholder="라이선스 키" maxlength="19" style="text-align:center; font-family:monospace;">
    <button id="loginBtn" class="primary-btn">로그인</button>
  </div>
</div>

<div id="appView" class="view">
  <div class="sidebar">
    <div class="sidebar-brand">ToolsX</div>
    <div id="navAi" class="nav-btn active">AI Detector</div>
    <div id="navPdf" class="nav-btn">PDF Compressor</div>
    <div id="navProfile" class="nav-btn">Profile</div>
    <button id="logoutBtn">로그아웃</button>
  </div>
  
  <div class="main-content">
    <div class="content-container">
      
      <div id="tabAi" class="tab-content active">
        <h2 class="section-title">AI Detector</h2>
        <textarea id="textInput" style="height:250px; resize:none; line-height:1.6;" placeholder="텍스트 입력"></textarea>
        <button id="analyzeBtn" class="primary-btn">분석 시작</button>
        <div id="resultBox" class="result-box">
          <div style="font-size:12px; color:#777; margin-bottom:8px;">AI 작성 확률</div>
          <div id="aiScore" style="font-size:40px; font-weight:700;">0%</div>
        </div>
      </div>

      <div id="tabPdf" class="tab-content">
        <h2 class="section-title">PDF Compressor</h2>
        <div class="drop-zone" id="pdfDropZone">파일 선택</div>
        <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
        <div id="pdfFileInfo" class="file-info">
          <div class="info-row"><span>파일명:</span> <strong id="pdfFileName">-</strong></div>
          <div class="info-row"><span>원본 크기:</span> <strong id="pdfFileSize">-</strong></div>
        </div>
        <div id="pdfResult" class="file-info" style="border: 1px solid #333; margin-top: 16px;">
            <div class="info-row"><span>압축 후:</span> <strong id="resAfter">-</strong></div>
            <div class="info-row"><span>압축률:</span> <strong id="resRate" class="text-green">-</strong></div>
        </div>
        <button id="compressPdfBtn" class="primary-btn" style="display: none;">압축 실행</button>
      </div>

      <div id="tabProfile" class="tab-content">
        <h2 class="section-title">Profile</h2>
        <div class="profile-card">
          <div class="info-row-profile">
             <span>라이선스 키</span>
             <div><span id="profKey">-</span> <button id="toggleKeyBtn" class="icon-btn">보기</button></div>
          </div>
          <div class="info-row-profile"><span>일일 제한</span><span id="profLimit">-</span></div>
          <div class="info-row-profile"><span>사용량</span><span id="profUsed">-</span></div>
          <div class="info-row-profile"><span>남은 용량</span><span id="profRemain" class="text-green">-</span></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('ai_license_key')) { document.getElementById('appView').classList.add('active'); } 
  else { document.getElementById('loginView').classList.add('active'); }

  const API_BASE = "https://toolsx.onrender.com/api";
  let currentProfile = { key: '', limit: 0, used: 0, role: 'user' };
  let isKeyVisible = false;

  const navIds = ['navAi', 'navPdf', 'navProfile'];
  const tabIds = ['tabAi', 'tabPdf', 'tabProfile'];
  navIds.forEach((nId, i) => {
    document.getElementById(nId).onclick = () => {
      tabIds.forEach(t => document.getElementById(t).classList.remove('active'));
      navIds.forEach(n => document.getElementById(n).classList.remove('active'));
      document.getElementById(tabIds[i]).classList.add('active');
      document.getElementById(nId).classList.add('active');
    };
  });

  document.getElementById('analyzeBtn').onclick = async () => {
    const text = document.getElementById('textInput').value.trim();
    if (!text) return alert('텍스트를 입력하세요.');
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true; btn.textContent = "분석 중...";
    try {
      const res = await fetch(`${API_BASE}/detect`, { 
        method: 'POST', headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ text, licenseKey: localStorage.getItem('ai_license_key') }) 
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('aiScore').textContent = data.aiScore + "%";
        document.getElementById('resultBox').style.display = "block";
      } else alert(data.error);
    } catch (e) { alert("연결 실패"); } finally { btn.disabled = false; btn.textContent = "분석 시작"; }
  };

  document.getElementById('pdfInput').onchange = (e) => {
    const f = e.target.files[0];
    if(f) {
      document.getElementById('pdfFileName').textContent = f.name;
      document.getElementById('pdfFileSize').textContent = (f.size / 1024 / 1024).toFixed(2) + " MB";
      document.getElementById('pdfFileInfo').style.display = "block";
      document.getElementById('compressPdfBtn').style.display = "block";
      document.getElementById('pdfResult').style.display = "none";
    }
  };
  document.getElementById('pdfDropZone').onclick = () => document.getElementById('pdfInput').click();

  document.getElementById('compressPdfBtn').onclick = async () => {
    const file = document.getElementById('pdfInput').files[0];
    const btn = document.getElementById('compressPdfBtn');
    btn.disabled = true; btn.textContent = "압축 중...";
    try {
      const fd = new FormData(); fd.append('pdf', file);
      const res = await fetch(`${API_BASE}/compress`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error();
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = "compressed_" + file.name;
      a.click();
      document.getElementById('resAfter').textContent = (blob.size / 1024 / 1024).toFixed(2) + " MB";
      document.getElementById('resRate').textContent = ((1 - (blob.size / file.size)) * 100).toFixed(1) + "%";
      document.getElementById('pdfResult').style.display = "block";
    } catch(e) { alert("압축 실패"); } finally { btn.disabled = false; btn.textContent = "압축 실행"; }
  };

  document.getElementById('toggleKeyBtn').onclick = () => {
    isKeyVisible = !isKeyVisible;
    document.getElementById('profKey').textContent = isKeyVisible ? currentProfile.key : '****-****-****-' + currentProfile.key.slice(-4);
    document.getElementById('toggleKeyBtn').textContent = isKeyVisible ? '숨기기' : '보기';
  };

  document.getElementById('loginBtn').onclick = async () => {
    const key = document.getElementById('licenseInput').value;
    const res = await fetch(`${API_BASE}/verify`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({licenseKey:key}) });
    if (res.ok) { 
      const data = await res.json();
      localStorage.setItem('ai_license_key', key);
      currentProfile = { key, limit: data.limit, used: data.used, role: data.role };
      document.getElementById('profKey').textContent = '****-****-****-' + key.slice(-4);
      document.getElementById('profLimit').textContent = data.limit;
      document.getElementById('profUsed').textContent = data.used;
      document.getElementById('profRemain').textContent = data.limit - data.used;
      document.getElementById('loginView').classList.remove('active');
      document.getElementById('appView').classList.add('active');
    } else alert("인증 실패");
  };

  document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('ai_license_key'); location.reload(); };
</script>
</body>
</html>
