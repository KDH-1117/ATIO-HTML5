<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DETECTOR</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    body { background-color: #050505; color: #ededed; height: 100vh; overflow: hidden; }
    
    input, select, textarea {
      width: 100%; background: #111; border: 1px solid #222; color: #fff;
      padding: 16px; border-radius: 8px; font-size: 14px; outline: none;
      transition: border 0.2s ease; margin-bottom: 16px;
    }
    input:focus, select:focus, textarea:focus { border-color: #444; }
    button {
      width: 100%; background: #fff; color: #000; padding: 16px;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.8; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* 화면 전환 클래스 */
    .view { display: none; }
    .view.active { display: flex; }

    /* --- 로그인 화면 --- */
    #loginView { flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .login-box { width: 100%; max-width: 400px; padding: 32px; }
    .login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 32px; letter-spacing: -0.5px; text-align: center; }

    /* --- 메인 대시보드 레이아웃 --- */
    #appView { height: 100vh; width: 100%; display: none; }
    #appView.active { display: flex; }

    /* 왼쪽 사이드바 */
    .sidebar { width: 240px; background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 24px; }
    .brand { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 40px; padding: 0 12px; }
    .menu { flex: 1; }
    .menu-item {
      padding: 12px; margin-bottom: 8px; color: #777; font-size: 14px; font-weight: 500;
      cursor: pointer; border-radius: 8px; transition: all 0.2s;
    }
    .menu-item:hover { color: #fff; background: #111; }
    .menu-item.active { color: #fff; background: #1a1a1a; }
    .logout-btn { color: #555; }
    .logout-btn:hover { color: #ff4d4d; background: transparent; }

    /* 오른쪽 메인 컨텐츠 영역 */
    .main-content { flex: 1; padding: 48px; overflow-y: auto; background: #050505; }
    .content-container { max-width: 720px; margin: 0 auto; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.5px; }

    /* 탭 컨텐츠 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 워크스페이스 세부 디자인 */
    textarea { height: 240px; resize: none; line-height: 1.6; }
    .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-top: -8px; margin-bottom: 24px; padding: 0 4px; }
    
    .result-box {
      margin-top: 24px; padding: 32px; background: #0a0a0a;
      border: 1px solid #1a1a1a; border-radius: 8px; text-align: center; display: none;
    }
    .result-label { font-size: 12px; color: #777; margin-bottom: 12px; letter-spacing: 1px; }
    .result-score { font-size: 48px; font-weight: 700; color: #fff; letter-spacing: -1px; }

    /* 프로필 세부 디자인 */
    .profile-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 24px; }
    .info-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #141414; font-size: 14px; }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-label { color: #777; }
    .info-value { color: #fff; font-family: monospace; font-size: 15px; }
    .highlight { color: #fff; font-weight: 700; }
  </style>
</head>
<body>

<!-- 1. 로그인 화면 -->
<div id="loginView" class="view active">
  <div class="login-box">
    <h1>AI DETECTOR</h1>
    <input type="text" id="licenseInput" placeholder="Enter License Key" autocomplete="off" spellcheck="false">
    <button id="loginBtn">Access</button>
  </div>
</div>

<!-- 2. 앱 화면 (사이드바 + 메인) -->
<div id="appView" class="view">
  
  <!-- 사이드바 메뉴 -->
  <div class="sidebar">
    <div class="brand">DETECTOR</div>
    <div class="menu">
      <div class="menu-item active" id="navWorkspace">Workspace</div>
      <div class="menu-item" id="navProfile">Profile</div>
    </div>
    <div>
      <div class="menu-item logout-btn" id="logoutBtn">Logout</div>
    </div>
  </div>

  <!-- 메인 컨텐츠 -->
  <div class="main-content">
    <div class="content-container">
      
      <!-- [탭 1] Workspace -->
      <div id="tabWorkspace" class="tab-content active">
        <h2 class="section-title">WORKSPACE</h2>
        <select id="modelSelect">
          <option value="sapling">Model: Sapling AI</option>
          <option value="huggingface">Model: Hugging Face</option>
        </select>
        <textarea id="textInput" placeholder="Paste text here to analyze..."></textarea>
        <div class="status-bar">
          <span id="charCount">0 chars</span>
        </div>
        <button id="analyzeBtn">Analyze</button>

        <div id="resultBox" class="result-box">
          <div class="result-label">AI PROBABILITY</div>
          <div class="result-score" id="aiScore">-</div>
        </div>
      </div>

      <!-- [탭 2] Profile -->
      <div id="tabProfile" class="tab-content">
        <h2 class="section-title">PROFILE</h2>
        <div class="profile-card">
          <div class="info-row">
            <span class="info-label">License Key</span>
            <span class="info-value" id="profKey">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Daily Limit</span>
            <span class="info-value" id="profLimit">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Used Characters</span>
            <span class="info-value" id="profUsed">-</span>
          </div>
          <div class="info-row" style="margin-top: 8px; border-top: 1px solid #222; padding-top: 24px;">
            <span class="info-label highlight">Remaining</span>
            <span class="info-value highlight" id="profRemain">-</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const API_BASE = "https://atio.onrender.com/api";

  // 상태 관리
  let currentProfile = { key: '', limit: 0, used: 0 };

  // DOM 요소
  const loginView = document.getElementById('loginView');
  const appView = document.getElementById('appView');
  const navWorkspace = document.getElementById('navWorkspace');
  const navProfile = document.getElementById('navProfile');
  const tabWorkspace = document.getElementById('tabWorkspace');
  const tabProfile = document.getElementById('tabProfile');

  // 화면/탭 전환 로직
  function switchView(view) {
    loginView.classList.remove('active');
    appView.classList.remove('active');
    if (view === 'login') loginView.classList.add('active');
    if (view === 'app') appView.classList.add('active');
  }

  function switchTab(tab) {
    navWorkspace.classList.remove('active');
    navProfile.classList.remove('active');
    tabWorkspace.classList.remove('active');
    tabProfile.classList.remove('active');

    if (tab === 'workspace') {
      navWorkspace.classList.add('active');
      tabWorkspace.classList.add('active');
    } else {
      navProfile.classList.add('active');
      tabProfile.classList.add('active');
      updateProfileUI(); // 프로필 탭 열 때 UI 업데이트
    }
  }

  navWorkspace.addEventListener('click', () => switchTab('workspace'));
  navProfile.addEventListener('click', () => switchTab('profile'));

  // 프로필 UI 업데이트 함수
  function updateProfileUI() {
    document.getElementById('profKey').textContent = currentProfile.key;
    document.getElementById('profLimit').textContent = currentProfile.limit.toLocaleString();
    document.getElementById('profUsed').textContent = currentProfile.used.toLocaleString();
    document.getElementById('profRemain').textContent = Math.max(0, currentProfile.limit - currentProfile.used).toLocaleString();
  }

  // 로그인 (서버 검증 기능 추가됨)
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const key = document.getElementById('licenseInput').value.trim();
    if (!key) return;

    const btn = document.getElementById('loginBtn');
    btn.textContent = "Verifying...";
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ licenseKey: key })
      });
      const data = await res.json();

      if (!res.ok) {
        alert("유효하지 않은 라이선스 키입니다.");
      } else {
        // 검증 성공 시
        currentProfile = { key: key, limit: data.limit, used: data.used };
        localStorage.setItem('ai_license_key', key);
        document.getElementById('licenseInput').value = '';
        switchView('app');
        switchTab('workspace');
      }
    } catch (e) {
      alert("서버 연결 실패. 서버가 준비 중일 수 있습니다.");
    } finally {
      btn.textContent = "Access";
      btn.disabled = false;
    }
  });

  // 로그아웃
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('ai_license_key');
    document.getElementById('textInput').value = '';
    document.getElementById('resultBox').style.display = 'none';
    switchView('login');
  });

  // 글자 수 세기
  document.getElementById('textInput').addEventListener('input', (e) => {
    document.getElementById('charCount').textContent = `${e.target.value.length} chars`;
  });

  // 분석
  document.getElementById('analyzeBtn').addEventListener('click', async () => {
    const text = document.getElementById('textInput').value.trim();
    const model = document.getElementById('modelSelect').value;
    const key = localStorage.getItem('ai_license_key');

    if (!text) return;

    const btn = document.getElementById('analyzeBtn');
    btn.textContent = "Analyzing...";
    btn.disabled = true;
    document.getElementById('resultBox').style.display = "none";

    try {
      const res = await fetch(`${API_BASE}/detect`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, licenseKey: key, model })
      });
      const data = await res.json();

      if (!res.ok) {
        if (res.status === 401) document.getElementById('logoutBtn').click(); // 키 잘림
        else alert(data.error);
      } else {
        document.getElementById('aiScore').textContent = data.aiScore + "%";
        document.getElementById('resultBox').style.display = "block";
        
        // 분석 성공 시 백그라운드에서 프로필(사용량) 데이터 갱신
        currentProfile.used = data.usedChars; 
      }
    } catch (e) {
      alert("분석 중 오류가 발생했습니다.");
    } finally {
      btn.textContent = "Analyze";
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
