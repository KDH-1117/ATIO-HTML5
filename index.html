<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DETECTOR</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    body { background-color: #050505; color: #ededed; height: 100vh; overflow: hidden; }
    
    /* 레이아웃 */
    .view { display: none; }
    .view.active { display: flex; }
    
    /* 로그인 뷰 */
    #loginView { flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .login-box { width: 100%; max-width: 400px; padding: 32px; text-align: center; }
    .login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 32px; }
    
    /* 입력 및 버튼 */
    input, textarea { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; }
    button { width: 100%; background: #fff; color: #000; padding: 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    button:hover { opacity: 0.8; }

    /* 대시보드 구조 */
    #appView { height: 100vh; width: 100%; display: none; }
    .sidebar { width: 240px; background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 24px; }
    .main-content { flex: 1; padding: 48px; overflow-y: auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* UI 요소 */
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
    .result-box { margin-top: 24px; padding: 32px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; text-align: center; display: none; }
    .profile-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 24px; }
    .info-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #141414; }
    .icon-btn { background: none; border: none; color: #555; cursor: pointer; padding: 4px; }
  </style>
</head>
<body>

<div id="loginView" class="view active">
  <div class="login-box">
    <h1>AI DETECTOR</h1>
    <input type="text" id="licenseInput" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" style="text-align:center; font-family:monospace; letter-spacing:1px;">
    <button id="loginBtn">Access</button>
  </div>
</div>

<div id="appView" class="view">
  <div class="sidebar">
    <div style="font-weight:700; margin-bottom:40px; padding-left:12px">DETECTOR</div>
    <div id="navWorkspace" style="padding:12px; cursor:pointer; background:#1a1a1a; border-radius:8px; margin-bottom:8px">Workspace</div>
    <div id="navProfile" style="padding:12px; cursor:pointer; color:#777">Profile</div>
    <button id="logoutBtn" style="margin-top:auto; background:none; color:#ff4d4d; border:1px solid #331111">Logout</button>
  </div>
  
  <div class="main-content">
    <div id="tabWorkspace" class="tab-content active" style="max-width:700px; margin:0 auto">
      <h2 class="section-title">WORKSPACE</h2>
      <textarea id="textInput" style="height:280px; resize:none" placeholder="텍스트를 붙여넣으세요..."></textarea>
      <button id="analyzeBtn">Analyze (Ensemble Mode)</button>
      <div id="resultBox" class="result-box">
        <div style="font-size:12px; color:#777; margin-bottom:12px">AI PROBABILITY</div>
        <div id="aiScore" style="font-size:48px; font-weight:700">0%</div>
      </div>
    </div>

    <div id="tabProfile" class="tab-content" style="max-width:700px; margin:0 auto">
      <h2 class="section-title">PROFILE</h2>
      <div class="profile-card">
        <div class="info-row"><span>License</span><div style="display:flex; align-items:center; gap:8px"><span id="profKey">-</span><button id="toggleKeyBtn" class="icon-btn">👁️</button></div></div>
        <div class="info-row"><span>Limit</span><span id="profLimit">-</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = "https://atio.onrender.com/api";
  let currentProfile = { key: '', limit: 0, used: 0 };
  let isKeyVisible = false;

  // 1. 키 자동 포맷팅 (대문자 + 하이픈)
  document.getElementById('licenseInput').addEventListener('input', function() {
    let val = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
    let formatted = '';
    for (let i = 0; i < val.length; i++) {
      if (i > 0 && i % 4 === 0) formatted += '-';
      formatted += val[i];
    }
    this.value = formatted;
  });

  // 2. 탭 전환
  document.getElementById('navWorkspace').onclick = () => {
    document.getElementById('tabWorkspace').classList.add('active');
    document.getElementById('tabProfile').classList.remove('active');
  };
  document.getElementById('navProfile').onclick = () => {
    document.getElementById('tabProfile').classList.add('active');
    document.getElementById('tabWorkspace').classList.remove('active');
  };

  // 3. 키 마스킹 토글
  document.getElementById('toggleKeyBtn').onclick = () => {
    isKeyVisible = !isKeyVisible;
    const keyEl = document.getElementById('profKey');
    keyEl.textContent = isKeyVisible ? currentProfile.key : '****-****-****-' + currentProfile.key.slice(-4);
  };

  // 4. 분석 실행
  document.getElementById('analyzeBtn').onclick = async () => {
    const text = document.getElementById('textInput').value;
    if (!text) return;
    const btn = document.getElementById('analyzeBtn');
    btn.textContent = "Analyzing..."; btn.disabled = true;
    
    const res = await fetch(`${API_BASE}/detect`, { 
      method: 'POST', 
      headers: {'Content-Type': 'application/json'}, 
      body: JSON.stringify({ text, licenseKey: localStorage.getItem('ai_license_key') }) 
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('aiScore').textContent = data.aiScore + "%";
      document.getElementById('resultBox').style.display = "block";
    } else alert(data.error);
    btn.textContent = "Analyze (Ensemble Mode)"; btn.disabled = false;
  };

  // 5. 로그인/로그아웃
  document.getElementById('loginBtn').onclick = async () => {
    const key = document.getElementById('licenseInput').value;
    const res = await fetch(`${API_BASE}/verify`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({licenseKey:key}) });
    if (res.ok) { 
      const data = await res.json();
      localStorage.setItem('ai_license_key', key);
      currentProfile = { key, limit: data.limit, used: data.used };
      document.getElementById('profKey').textContent = '****-****-****-' + key.slice(-4);
      document.getElementById('profLimit').textContent = data.limit;
      document.getElementById('loginView').classList.remove('active');
      document.getElementById('appView').classList.add('active');
    } else alert("Invalid Key");
  };

  document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('ai_license_key'); location.reload(); };

  window.onload = async () => {
    const key = localStorage.getItem('ai_license_key');
    if (key) {
      const res = await fetch(`${API_BASE}/verify`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({licenseKey:key}) });
      if (res.ok) {
        const data = await res.json();
        currentProfile = { key, limit: data.limit, used: data.used };
        document.getElementById('profKey').textContent = '****-****-****-' + key.slice(-4);
        document.getElementById('profLimit').textContent = data.limit;
        document.getElementById('loginView').classList.remove('active');
        document.getElementById('appView').classList.add('active');
      }
    }
  };
</script>
</body>
</html>
