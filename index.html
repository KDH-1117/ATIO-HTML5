<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 글 검사기 (라이선스 버전)</title>
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
    .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
    h2 { margin-top: 0; color: #333; }
    label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; }
    textarea { width: 100%; height: 150px; margin-top: 5px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; box-sizing: border-box; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .char-count { font-size: 12px; color: #666; text-align: right; margin-top: 5px; }
    button { width: 100%; padding: 12px; margin-top: 20px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    .result-box { margin-top: 20px; padding: 15px; border-radius: 6px; background-color: #e9ecef; display: none; }
    .result-box h3 { margin: 0 0 10px 0; color: #333; }
  </style>
</head>
<body>

<div class="container">
  <h2>🤖 AI 텍스트 검사기</h2>
  
  <label>라이선스 키</label>
  <input type="text" id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX 형식으로 입력" value="ADMIN-TEST-KEY">

  <label>검사 모델 선택</label>
  <select id="modelSelect">
    <option value="sapling">Sapling AI (정확도 높음)</option>
    <option value="huggingface">Hugging Face (오픈소스)</option>
  </select>

  <label>검사할 텍스트</label>
  <textarea id="textInput" placeholder="여기에 텍스트를 붙여넣으세요..."></textarea>
  <div class="char-count" id="charCount">공백 포함: 0자 / 공백 제외: 0자</div>

  <button id="checkBtn">AI 작성 확률 검사하기</button>

  <div class="result-box" id="resultBox">
    <h3>📊 검사 결과</h3>
    <p><strong>AI 작성 확률:</strong> <span id="aiScore" style="color: #d9534f; font-size: 20px; font-weight: bold;">-</span></p>
    <p style="font-size: 13px; color: #555;">일일 사용량: <span id="usageInfo">-</span></p>
  </div>
</div>

<script>
  // 회원님의 Render 서버 주소로 완벽히 세팅되었습니다.
  const SERVER_URL = "https://atio.onrender.com/api/detect";

  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  const checkBtn = document.getElementById('checkBtn');
  const resultBox = document.getElementById('resultBox');

  // 글자 수 실시간 계산 (공백 포함 / 제외)
  textInput.addEventListener('input', () => {
    const text = textInput.value;
    const noSpaceText = text.replace(/\s+/g, '');
    charCount.textContent = `공백 포함: ${text.length}자 / 공백 제외: ${noSpaceText.length}자`;
  });

  // 검사 버튼 클릭 시 동작
  checkBtn.addEventListener('click', async () => {
    const text = textInput.value.trim();
    const licenseKey = document.getElementById('licenseKey').value.trim();
    const model = document.getElementById('modelSelect').value;

    if (!text || !licenseKey) {
      alert("텍스트와 라이선스 키를 모두 입력해주세요.");
      return;
    }

    checkBtn.textContent = "검사 중... (무료 서버라 첫 시도는 최대 50초가 걸릴 수 있습니다)";
    checkBtn.disabled = true;
    resultBox.style.display = "none";

    try {
      // 내 Render 서버로 데이터 전송
      const response = await fetch(SERVER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, licenseKey, model })
      });

      const data = await response.json();

      if (!response.ok) {
        alert("오류: " + data.error);
      } else {
        // 성공 시 결과 화면 표시
        document.getElementById('aiScore').textContent = data.aiScore + "%";
        document.getElementById('usageInfo').textContent = `${data.usedChars.toLocaleString()}자 / ${data.dailyLimit.toLocaleString()}자`;
        resultBox.style.display = "block";
      }
    } catch (error) {
      alert("서버에 연결할 수 없습니다. 서버가 켜지는 중이거나 주소가 잘못되었습니다.");
      console.error(error);
    } finally {
      checkBtn.textContent = "AI 작성 확률 검사하기";
      checkBtn.disabled = false;
    }
  });
</script>

</body>
</html>
